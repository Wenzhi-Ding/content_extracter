<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrowserClaw</title>
    <style>
      :root {
        --bg: #000000;
        --surface: #111111;
        --surface-hover: #1A1A1A;
        --primary: #EDEDED;
        --primary-text: #000000;
        --accent: #262626;
        --text: #EDEDED;
        --text-secondary: #A1A1AA;
        --border: #262626;
        --border-hover: #333333;
        --success: #10B981;
        --error: #EF4444;
        --radius-sm: 6px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --shadow-sm: 0 1px 2px rgba(0,0,0,0.5);
        --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.5);
        --transition: 0.15s ease-in-out;
      }
      
      * {
        box-sizing: border-box;
      }

      html, body {
        width: 420px;
        min-height: 560px;
        height: 640px;
        max-height: 640px;
        border-radius: 18px;
        overflow: hidden;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-size: 13px;
        line-height: 1.5;
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        width: 420px;
        min-height: 560px;
        height: 640px;
        max-height: 640px;
        border: 1px solid #2E2E2E;
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #app {
        display: flex;
        flex-direction: column;
        height: 100%;
        min-height: 0;
        max-height: 100%;
        overflow: hidden;
        border-radius: inherit;
      }

      h1, h2, h3, h4, p {
        margin: 0;
      }

      button {
        cursor: pointer;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 6px 12px;
        font-size: 13px;
        font-weight: 500;
        background: var(--surface);
        color: var(--text);
        transition: all var(--transition);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        user-select: none;
      }

      button:hover:not(:disabled) {
        background: var(--surface-hover);
        border-color: var(--border-hover);
      }

      button:active:not(:disabled) {
        transform: scale(0.98);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn-primary {
        background: var(--primary);
        color: var(--primary-text);
        border-color: var(--primary);
      }

      .btn-primary:hover:not(:disabled) {
        background: #FFFFFF;
        border-color: #FFFFFF;
      }

      .btn-accent {
        background: var(--surface);
        color: var(--text);
        border-color: var(--border);
      }

      .btn-accent:hover:not(:disabled) {
        border-color: var(--text-secondary);
      }

      .btn-success {
        background: var(--success);
        color: #000;
        border-color: var(--success);
      }

      .btn-error {
        background: transparent;
        color: var(--text-secondary);
        border-color: transparent;
      }
      
      .btn-error:hover:not(:disabled) {
        background: rgba(239, 68, 68, 0.1);
        border-color: rgba(239, 68, 68, 0.3);
      }

      .btn-icon {
        padding: 6px;
        border: 1px solid transparent;
        background: transparent;
        border-radius: var(--radius-sm);
        color: var(--text-secondary);
      }

      .btn-icon:hover:not(:disabled) {
        background: var(--surface-hover);
        color: var(--text);
        border-color: var(--border);
      }

      input, select {
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 8px 12px;
        border-radius: var(--radius-sm);
        width: 100%;
        font-family: inherit;
        font-size: 13px;
        transition: border-color var(--transition);
        margin-bottom: 12px;
      }

      input:focus, select:focus {
        outline: none;
        border-color: var(--text-secondary);
      }

      label {
        display: block;
        margin-bottom: 6px;
        color: var(--text-secondary);
        font-size: 12px;
        font-weight: 500;
      }

      .card {
        background: var(--surface);
        border: 1px solid #3A3A3A;
        border-radius: var(--radius-md);
        padding: 14px;
        margin: 10px 0;
        transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03), 0 8px 24px rgba(0, 0, 0, 0.24);
      }

      .card:hover {
        border-color: #505050;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04), 0 10px 28px rgba(0, 0, 0, 0.32);
      }

      .card-clickable {
        cursor: pointer;
      }

      .card-clickable:hover {
        transform: translateY(-1px);
      }

      /* header-bar removed */

      .file-list {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 0 16px;
      }

      .action-bar {
        padding: 12px 16px;
        border-top: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: flex;
        gap: 8px;
        align-items: center;
        flex-shrink: 0;
        z-index: 10;
      }

      .panel-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        background: rgba(10, 10, 10, 0.96);
      }

      .panel-title {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }

      .preview-wrap {
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .preview-meta {
        padding: 14px 16px 12px;
        border-bottom: 1px solid var(--border);
        background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0));
      }

      .preview-body {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
      }

      .preview-text {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        color: #D4D4D8;
        font-size: 12px;
        line-height: 1.65;
      }

      .drag-handle {
        cursor: grab;
        width: 28px;
        height: 28px;
        flex-shrink: 0;
        border: 1px solid #383838;
        border-radius: 8px;
        background: #171717;
        color: #8A8A8A;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: color var(--transition), border-color var(--transition), background var(--transition);
      }
      
      .card:hover .drag-handle {
        color: #D4D4D8;
        border-color: #4B4B4B;
        background: #1D1D1D;
      }

      .drag-handle:active {
        cursor: grabbing;
      }

      .text-secondary {
        color: var(--text-secondary);
      }

      .truncate {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .flex-row {
        display: flex;
        align-items: center;
      }

      .flex-col {
        display: flex;
        flex-direction: column;
      }

      .gap-1 { gap: 4px; }
      .gap-2 { gap: 8px; }
      .gap-3 { gap: 12px; }
      .w-full { width: 100%; }
      .mt-2 { margin-top: 8px; }
      .text-sm { font-size: 11px; }
      .text-xs { font-size: 10px; }
      .font-medium { font-weight: 500; }
      .font-semibold { font-weight: 600; }
      
      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border); 
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--text-secondary); 
      }

      /* Toggle switch styles */
      .toggle-switch {
        position: relative;
        display: inline-block;
        width: 36px;
        height: 20px;
      }
      .toggle-switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: var(--surface-hover);
        transition: .3s;
        border-radius: 20px;
        border: 1px solid var(--border);
      }
      .slider:before {
        position: absolute;
        content: "";
        height: 14px;
        width: 14px;
        left: 2px;
        bottom: 2px;
        background-color: var(--text-secondary);
        transition: .3s;
        border-radius: 50%;
      }
      input:checked + .slider {
        background-color: var(--primary);
        border-color: var(--primary);
      }
      input:checked + .slider:before {
        background-color: var(--primary-text);
        transform: translateX(16px);
      }
      input:focus + .slider {
        box-shadow: 0 0 1px var(--primary);
      }
      
      /* Empty state */
      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 48px 16px;
        color: var(--text-secondary);
      }
      .empty-icon {
        font-size: 32px;
        margin-bottom: 16px;
        opacity: 0.5;
        filter: grayscale(1);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
